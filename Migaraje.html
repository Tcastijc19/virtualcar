 <!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mi Garaje Virtual - VirtualCar</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --turquesa: #00ffe6;
      --negro: #000000;
      --blanco: #ffffff;
      --gris-bg: #f6f7f8;
      --dorado: #a8990b;
    }
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background-color: var(--gris-bg);
      color: var(--negro);
    }
    header {
      background: var(--negro);
      color: var(--blanco);
      padding: 20px 0;
      text-align: center;
      border-bottom: 4px solid var(--turquesa);
    }
    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .garage-header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }
    .garage-header i { font-size: 40px; color: var(--turquesa); }
    .garage-header h1 { font-family: 'Montserrat'; margin: 0; }

    /* Tarjeta de Vehículo Guardado */
    .vehicle-card {
      background: var(--blanco);
      border-radius: 16px;
      padding: 25px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
      border-left: 6px solid var(--turquesa);
      margin-bottom: 20px;
    }
    .vehicle-info h3 { font-family: 'Montserrat'; margin: 0; font-size: 22px; }
    .vehicle-info p { margin: 5px 0 0; color: #666; font-weight: 500; }
    
    .status-badge {
      background: #e0fffb;
      color: #008a7d;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* Sección para añadir nuevo */
    .add-vehicle {
      border: 2px dashed #ccc;
      border-radius: 16px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .add-vehicle:hover {
      border-color: var(--turquesa);
      background: #f0fffe;
    }
    .add-vehicle i { font-size: 30px; color: #999; margin-bottom: 10px; }
    .add-vehicle h4 { margin: 0; color: #777; font-family: 'Montserrat'; }

    .btn-back {
      display: inline-block;
      margin-top: 40px;
      padding: 12px 25px;
      background: var(--negro);
      color: var(--turquesa);
      text-decoration: none;
      border-radius: 10px;
      font-weight: 700;
      font-family: 'Montserrat';
    }
  </style>
</head>
<body>

  <header>
    <div style="font-family: 'Montserrat'; font-weight: 800; font-size: 24px;">VIRTUALCAR</div>
  </header>

  <main class="container">
    <div class="garage-header">
      <i class="fas fa-car-side"></i>
      <div>
        <h1>Mi Garaje</h1>
        <p>Administra tus vehículos para encontrar repuestos exactos más rápido.</p>
      </div>
    </div>

    <div class="vehicle-card">
      <div class="vehicle-info">
        <span class="status-badge">Vehículo Principal</span>
        <h3>Toyota Corolla</h3>
        <p>Año: 2015 | Placa: XYZ-123</p>
      </div>
      <div style="text-align: right;">
        <button style="background:none; border:none; color:var(--dorado); cursor:pointer; font-size:18px;" title="Editar">
          <i class="fas fa-edit"></i>
        </button>
        <button style="background:none; border:none; color:#ff4d4d; cursor:pointer; font-size:18px; margin-left:15px;" title="Eliminar">
          <i class="fas fa-trash-alt"></i>
        </button>
      </div>
    </div>

    <div class="add-vehicle">
      <i class="fas fa-plus-circle"></i>
      <h4>Agregar otro vehículo</h4>
    </div>

    <div style="text-align: center;">
      <a href="ProyectoSenaVirtualcar.com.co.html" class="btn-back">
        <i class="fas fa-store"></i> Ir a la Tienda
      </a>
    </div>
  </main>

</body>
</html>
