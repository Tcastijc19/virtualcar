<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Soporte Técnico - VirtualCar</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --turquesa: #00ffe6;
      --negro: #000000;
      --blanco: #ffffff;
      --gris-bg: #f6f7f8;
    }
    body {
      font-family: 'Roboto', sans-serif;
      margin: 0;
      background-color: var(--gris-bg);
      color: var(--negro);
    }
    header {
      background: var(--negro);
      color: var(--blanco);
      padding: 15px 0;
      text-align: center;
      border-bottom: 3px solid var(--turquesa);
    }
    .support-container {
      max-width: 700px;
      margin: 50px auto;
      background: var(--blanco);
      padding: 40px;
      border-radius: 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      text-align: center;
    }
    h1 { font-family: 'Montserrat'; font-weight: 800; margin-bottom: 10px; }
    p { color: #555; line-height: 1.6; }
    
    .contact-methods {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin: 30px 0;
    }
    .method-card {
      padding: 20px;
      border: 1px solid #eee;
      border-radius: 12px;
      transition: transform 0.3s;
    }
    .method-card:hover {
      transform: translateY(-5px);
      border-color: var(--turquesa);
    }
    .method-card i {
      font-size: 30px;
      color: var(--turquesa);
      margin-bottom: 15px;
    }
    .btn-return {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 30px;
      background: var(--negro);
      color: var(--turquesa);
      text-decoration: none;
      font-family: 'Montserrat';
      font-weight: 700;
      border-radius: 10px;
      transition: background 0.3s;
    }
    .btn-return:hover {
      background: #222;
    }
  </style>
</head>
<body>

  <header>
    <div style="font-family: 'Montserrat'; font-weight: 800; font-size: 22px;">VIRTUALCAR</div>
  </header>

  <main class="support-container">
    <i class="fas fa-headset" style="font-size: 60px; color: var(--turquesa); margin-bottom: 20px;"></i>
    <h1>Centro de Soporte</h1>
    <p>¿Tienes dudas sobre una autoparte o la compatibilidad con tu vehículo? Estamos aquí para asesorarte de lunes a viernes.</p>

    <a href="https://wa.me/573213537843?text=Hola%20VirtualCar,%20necesito%20soporte%20con%20un%20repuesto" 
   target="_blank" 
   style="text-decoration: none; color: inherit;">
  <div class="method-card">
    <i class="fab fa-whatsapp" style="color: #25D366;"></i> <h4>WhatsApp</h4>
    <p>321 353 7843</p>
  </div>
</a>
      <a href="mailto:virtualcarsas@gmail.com?subject=Consulta%20de%20Soporte%20VirtualCar&body=Hola%20equipo%20de%20VirtualCar," 
   style="text-decoration: none; color: inherit;">
  <div class="method-card">
    <i class="fas fa-envelope"></i>
    <h4>Correo</h4>
    <p>virtualcarsas@gmail.com</p>
  </div>
</a>

    <a href="ProyectoSenaVirtualcar.com.co.html" class="btn-return">
      <i class="fas fa-arrow-left"></i> Volver a la Tienda
    </a>
  </main>

</body>
</html>
